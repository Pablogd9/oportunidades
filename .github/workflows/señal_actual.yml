name: Señal Actual

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 1 * *'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Calcular señal actual
        run: python scripts/señal_actual.py
      - name: Commit resultado
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add data/señal_actual.json
          git diff --staged --quiet || git commit -m "Señal actual $(date -u '+%Y-%m-%d %H:%M')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
