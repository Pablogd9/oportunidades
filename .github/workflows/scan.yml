name: Escanear oportunidades

on:
  schedule:
    - cron: "30 7 * * *"
    - cron: "30 13 * * *"
    - cron: "30 20 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: escanear-oportunidades
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ejecutar escaner
        run: python scripts/scan.py

      - name: Ejecutar backtest (solo a las 7:30 UTC)
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "07" ]; then
            echo "Ejecutando backtest..."
            python scripts/backtest.py
          else
            echo "Backtest solo se ejecuta a las 7:30 UTC. Saltando."
          fi

      - name: Guardar resultados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/output.json
          git add data/backtest.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Sin cambios."
          else
            git commit -m "Escaneo automatico ($(date -u +%Y-%m-%d %H:%M))"
            git push
          fi
