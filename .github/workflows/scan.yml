name: Escanear oportunidades

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '30 7 * * *'
    - cron: '30 13 * * *'
    - cron: '30 20 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ejecutar macro
        run: python scripts/macro.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: Actualizar holdings SEC EDGAR
        run: python scripts/fetch_edgar.py
        continue-on-error: true

      - name: Ejecutar escaner
        run: python scripts/scan.py

      - name: Commit resultados
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add data/
          git diff --staged --quiet || git commit -m "Scan $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
